<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Crop Yield Prediction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <p class="eyebrow">Crop Yield System</p>
            <h1>Create account</h1>
            <p class="subtitle">Register as a user or admin to use the platform.</p>

            {% if error_message %}
            <div class="alert error">{{ error_message }}</div>
            {% endif %}

            <form method="POST" class="auth-form">
                <label>
                    Full Name
                    <input type="text" name="name" placeholder="Your full name" required>
                </label>

                <label>
                    Email
                    <input type="email" name="email" placeholder="name@example.com" required>
                </label>

                <label>
                    Password
                    <input type="password" name="password" placeholder="Create a password" required>
                </label>

                <label>
                    Account Type
                    <select name="role" id="role-select" required>
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </label>

                <label id="invite-code-wrap" class="hidden-field">
                    Admin Invite Code
                    <input type="password" name="invite_code" placeholder="Enter admin invite code">
                </label>

                <button type="submit">Register</button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="{{ url_for('login') }}">Login here</a>
            </p>
        </section>
    </main>

    <script>
        const roleSelect = document.getElementById('role-select');
        const inviteWrap = document.getElementById('invite-code-wrap');

        function toggleInvite() {
            inviteWrap.classList.toggle('hidden-field', roleSelect.value !== 'admin');
        }

        roleSelect.addEventListener('change', toggleInvite);
        toggleInvite();
    </script>
</body>
</html>
